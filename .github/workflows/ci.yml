name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    name: Frontend Lint And Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        env:
          # These vars let CI validate the production build output deterministically.
          VITE_API_BASE_URL: ${{ vars.PROD_API_BASE_URL || 'https://taskmanager.example.com/api/v1' }}
          VITE_SOCKET_URL: ${{ vars.PROD_SOCKET_URL || 'https://taskmanager.example.com' }}
        run: npm run build

  backend-quality:
    name: Backend Lint And Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MYSQL_DATABASE: taskmanager_test
          MYSQL_USER: taskmanager
          MYSQL_PASSWORD: taskmanager
          MYSQL_ROOT_PASSWORD: rootpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -prootpassword --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      JWT_ACCESS_SECRET: integration-access-secret-123456
      JWT_REFRESH_SECRET: integration-refresh-secret-123456
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: taskmanager_test
      DB_USER: taskmanager
      DB_PASSWORD: taskmanager
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        # Integration tests use real MariaDB and Redis service containers.
        run: npm run test:integration

  docker-build-and-push:
    name: Build And Publish Images
    runs-on: ubuntu-latest
    needs:
      - frontend-quality
      - backend-quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          # The full commit SHA is the immutable release identifier.
          tags: ghcr.io/${{ github.repository_owner }}/taskmanager-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.PROD_API_BASE_URL || 'https://taskmanager.example.com/api/v1' }}
            VITE_SOCKET_URL=${{ vars.PROD_SOCKET_URL || 'https://taskmanager.example.com' }}
          tags: ghcr.io/${{ github.repository_owner }}/taskmanager-frontend:${{ github.sha }}
